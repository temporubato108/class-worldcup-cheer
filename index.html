<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>초등학교 학급 월드컵 응원전! ⚽🇰🇷</title>
    <!-- Tailwind compiled stylesheet via Vite -->
    <link rel="stylesheet" href="/style.css" />
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;700&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  </head>
  <body class="bg-slate-50 md:h-screen md:overflow-hidden font-sans text-slate-800 antialiased selection:bg-rose-500 selection:text-white flex flex-col">
    
    <!-- Header bar -->
    <header class="bg-white border-b border-slate-200/60 px-4 py-6 shrink-0 flex items-center">
      <div class="max-w-6xl mx-auto w-full flex flex-wrap justify-between items-center gap-3">
        <div class="flex items-center gap-2">
          <span class="inline-flex items-center justify-center bg-rose-100 text-rose-700 px-2.5 py-0.5 rounded-full text-[10px] font-black uppercase tracking-wider animate-bounce">
            🏆 class event
          </span>
          <h1 class="text-lg font-black tracking-tight text-slate-900">
            우리 반 월드컵 응원단! 🎉
          </h1>
        </div>
        <div class="flex items-center gap-4 text-xs font-bold text-slate-400">
          <a href="./results.html" class="text-rose-500 hover:text-rose-700 transition-all flex items-center gap-1">
            📊 통계 & 예측결과 확인 &rarr;
          </a>
        </div>
      </div>
    </header>

    <!-- Main Content Grid -->
    <main class="flex-1 overflow-hidden p-4">
      <div class="max-w-6xl mx-auto h-full grid grid-cols-1 md:grid-cols-12 gap-5">
        
        <!-- LEFT COLUMN: Compact Widgets (Predict Ticket + Cheering Box) -->
        <div class="md:col-span-5 flex flex-col gap-4 overflow-y-auto md:overflow-hidden pr-1 h-full max-h-full pb-4">
          
          <!-- 1. MATCH BANNER TICKET (Compressed height) -->
          <div class="ticket border border-slate-200/60 overflow-hidden relative shadow-xs shrink-0">
            <!-- Red stadium-colored Ticket Header (Enlarged) -->
            <div class="bg-rose-600 text-white px-6 py-6 relative overflow-hidden shine-effect">
              <!-- Background soccer design -->
              <div class="absolute -right-4 -bottom-4 opacity-10 text-7xl font-black rotate-12 select-none">⚽</div>
              
              <div class="flex justify-between items-center mb-4">
                <p class="text-[10px] font-bold tracking-widest uppercase opacity-85 font-mono">ADMIT ONE • CLASS MATCHUP</p>
                <span class="bg-white/20 text-white font-mono text-[10px] px-2.5 py-0.5 rounded-xs font-bold">
                  06-19 경기
                </span>
              </div>
              
              <!-- STADIUM MATCH MATCHUP CARDS -->
              <div class="flex items-center justify-between bg-black/15 px-5 py-3.5 rounded-xl border border-white/10 backdrop-blur-xs">
                <div class="flex items-center gap-3">
                  <img src="https://flagcdn.com/w80/kr.png" alt="South Korea Flag" class="w-11 h-7.5 sm:w-14 sm:h-9 object-cover rounded shadow-md border border-white/20 animate-float" referrerPolicy="no-referrer">
                  <span class="text-sm sm:text-lg font-black tracking-wide">대한민국</span>
                </div>
                <div class="font-black italic text-rose-300 font-mono text-xs sm:text-base px-2.5 select-none">VS</div>
                <div class="flex items-center gap-3 flex-row-reverse">
                  <img src="https://flagcdn.com/w80/mx.png" alt="Mexico Flag" class="w-11 h-7.5 sm:w-14 sm:h-9 object-cover rounded shadow-md border border-white/20 animate-float" style="animation-delay: 1.5s;" referrerPolicy="no-referrer">
                  <span class="text-sm sm:text-lg font-black tracking-wide">멕시코</span>
                </div>
              </div>
            </div>
            
            <div class="ticket-cut-left"></div>
            <div class="ticket-cut-right"></div>
            <div class="ticket-divider"></div>
          </div>

          <!-- 2. PREDICTION FORM COMPACT BOX -->
          <div class="bg-white rounded-2xl border border-slate-200/60 shadow-xs p-5 flex-1 flex flex-col gap-4 min-h-0">
            <div class="flex items-center gap-1.5 pb-2.5 border-b border-slate-100 shrink-0">
              <span class="text-base">🎫</span>
              <h3 class="text-xs font-extrabold text-slate-800 uppercase tracking-wider">승부 예측 이벤트</h3>
              <span class="text-[9px] bg-rose-50 text-rose-500 px-1.5 py-0.5 rounded-full font-bold ml-auto shrink-0">1인 1회 제한</span>
            </div>

            <form id="prediction-form" onsubmit="submitPrediction(event)" class="flex-1 flex flex-col justify-between gap-4 min-h-0">
              <div class="space-y-3.5 flex-1 flex flex-col justify-center min-h-0">
                <!-- Name Input -->
                <div class="space-y-1 shrink-0">
                  <label for="predict-student-name" class="block text-[11px] font-bold text-slate-500">
                    학생 이름
                  </label>
                  <input 
                    type="text" 
                    id="predict-student-name" 
                    placeholder="이름 (한글 2~4자)" 
                    maxlength="4"
                    pattern="[가-힣]{2,4}"
                    title="한글 2~4글자만 입력 가능합니다 (공백 없이)"
                    class="w-full bg-slate-50 border border-slate-200/80 rounded-lg px-3 py-2 text-xs font-bold focus:outline-none focus:ring-1 focus:ring-rose-500 focus:bg-white focus:border-rose-500 transition-all placeholder:text-slate-400 placeholder:font-normal"
                    required
                  />
                </div>

                <!-- Option Select Cards -->
                <div class="space-y-1.5 flex-1 flex flex-col justify-center min-h-0">
                  <label class="block text-[11px] font-bold text-slate-500 shrink-0">
                    경기 결과 예측 선택
                  </label>
                  <input type="hidden" id="match-prediction" value="" />
                  <div class="grid grid-cols-3 gap-2 shrink-0">
                    <button 
                      type="button" 
                      id="predict-korea" 
                      onclick="selectPrediction('korea', '대한민국 승')"
                      class="predict-card border border-slate-200 rounded-lg py-2 px-1 text-center bg-white hover:border-rose-300 transition-all flex flex-col items-center justify-center min-h-[58px]"
                    >
                      <img src="https://flagcdn.com/w40/kr.png" alt="KR" class="w-6 h-4 object-cover rounded-xs shadow-xs mb-1 mx-auto block" referrerPolicy="no-referrer">
                      <p class="text-[10px] font-extrabold truncate">대한민국 승</p>
                      <span id="ratio-korea" class="hidden text-[10px] font-black mt-1 text-rose-600"></span>
                    </button>

                    <button 
                      type="button" 
                      id="predict-draw" 
                      onclick="selectPrediction('draw', '무승부')"
                      class="predict-card border border-slate-200 rounded-lg py-2 px-1 text-center bg-white hover:border-amber-300 transition-all flex flex-col items-center justify-center min-h-[58px]"
                    >
                      <div class="text-xs mb-1 select-none text-center">🤝</div>
                      <p class="text-[10px] font-extrabold truncate">무승부</p>
                      <span id="ratio-draw" class="hidden text-[10px] font-black mt-1 text-amber-600"></span>
                    </button>

                    <button 
                      type="button" 
                      id="predict-mexico" 
                      onclick="selectPrediction('mexico', '멕시코 승')"
                      class="predict-card border border-slate-200 rounded-lg py-2 px-1 text-center bg-white hover:border-blue-300 transition-all flex flex-col items-center justify-center min-h-[58px]"
                    >
                      <img src="https://flagcdn.com/w40/mx.png" alt="MX" class="w-6 h-4 object-cover rounded-xs shadow-xs mb-1 mx-auto block" referrerPolicy="no-referrer">
                      <p class="text-[10px] font-extrabold truncate">멕시코 승</p>
                      <span id="ratio-mexico" class="hidden text-[10px] font-black mt-1 text-blue-600"></span>
                    </button>
                  </div>
                </div>
              </div>

              <!-- Submit Button -->
              <button 
                type="submit" 
                id="predict-submit-btn"
                class="w-full bg-rose-600 hover:bg-rose-700 text-white font-extrabold py-2.5 px-4 rounded-lg shadow-xs hover:shadow-sm transition-all text-xs tracking-wide flex justify-center items-center gap-1 cursor-pointer border-none shrink-0"
              >
                <span>🎫 예측 투표 제출</span>
              </button>
            </form>

            <!-- Real-time Stats & Countdown Info under Submission -->
            <div class="bg-slate-50 border border-slate-100 rounded-lg p-3 space-y-1.5 text-[11px] font-bold text-slate-600 shrink-0">
              <div class="flex justify-between items-center px-1">
                <span>현재 예측 참여 인원</span>
                <span class="text-slate-900 font-extrabold"><span id="prediction-participant-count" class="text-rose-600 font-black">0</span>명 참여 중</span>
              </div>
              <div class="flex justify-between items-center px-1 border-t border-slate-200/50 pt-1.5 font-bold">
                <span>경기 시작(마감) 남은 시간</span>
                <span id="game-countdown-timer" class="text-rose-600 font-mono font-extrabold">--일 --시간 --분 --초</span>
              </div>
            </div>

            <div id="predict-success-alert" class="hidden bg-emerald-500 text-white p-2.5 rounded-lg text-center text-xs font-semibold animate-pulse shrink-0">
              🎉 승부예측 참여가 완료되었습니다.
            </div>
          </div>

        </div>

        <!-- RIGHT COLUMN: High-density widget list -->
        <div class="md:col-span-7 flex flex-col h-full max-h-full pb-4 overflow-y-auto md:overflow-hidden pr-1">

          <!-- RIGHT COLUMN: High-density, vertical scroll-contained Cheering Screen with Integrated Message form -->
          <div class="flex-1 flex flex-col min-h-0 h-full bg-white rounded-2xl border border-slate-200/75 shadow-xs overflow-hidden">
          
            <!-- Live Board Header -->
            <div class="bg-slate-900 text-white px-4 py-3.5 flex justify-between items-center shrink-0">
              <div class="flex items-center gap-2">
                <span class="flex h-2 w-2 relative">
                  <span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-rose-400 opacity-75"></span>
                  <span class="relative inline-flex rounded-full h-2 w-2 bg-rose-500"></span>
                </span>
                <h2 class="text-xs sm:text-sm font-extrabold tracking-tight">우리 반 실시간 응원 전광판 📣</h2>
              </div>
              
              <div class="flex items-center gap-2">
                <span id="countdown-indicator" class="text-[10px] font-mono font-bold text-slate-400 bg-slate-800 px-2 py-0.5 rounded-xs">
                  10초 후 갱신
                </span>
                <button onclick="fetchCheeringData()" class="p-1 rounded hover:bg-slate-800 text-slate-300 hover:text-white transition-all text-xs cursor-pointer" title="수동 갱신">
                  🔄
                </button>
              </div>
            </div>

            <!-- Integrated Cheering Form on Top of the Board -->
            <div class="bg-slate-50 border-b border-slate-200/80 p-4 shrink-0 space-y-3">
              <div class="flex items-center gap-1.5">
                <span class="text-sm">💬</span>
                <h3 class="text-xs font-extrabold text-slate-700 uppercase tracking-wider">응원 메시지 한마디 남기기</h3>
                <span class="text-[9px] bg-white text-slate-500 border border-slate-200/80 px-2 py-0.5 rounded-full font-bold ml-auto shrink-0">누구나 무제한</span>
              </div>

              <form id="cheering-form" onsubmit="submitCheeringMessage(event)" class="space-y-3">
                <div class="grid grid-cols-12 gap-2">
                  <!-- Name Input (Col span 3 - Reduced Size) -->
                  <div class="col-span-3 space-y-1">
                    <label for="cheer-student-name" class="block text-[10px] font-bold text-slate-500">
                      작성자
                    </label>
                    <input 
                      type="text" 
                      id="cheer-student-name" 
                      placeholder="이름" 
                      maxlength="4"
                      pattern="[가-힣]{2,4}"
                      title="한글 2~4글자만 입력 가능합니다 (공백 없이)"
                      class="w-full bg-white border border-slate-200 rounded-lg px-2.5 py-2 text-xs font-bold focus:outline-none focus:ring-1 focus:ring-rose-500 focus:bg-white focus:border-rose-500 transition-all placeholder:text-slate-400"
                      required
                    />
                  </div>
                  <!-- Message Input (Col span 9 - Expanded Size) -->
                  <div class="col-span-9 space-y-1">
                    <div class="flex justify-between items-center">
                      <label for="cheering-msg" class="block text-[10px] font-bold text-slate-500">
                        응원 문구 (30자)
                      </label>
                      <span id="char-count-badge" class="font-mono text-[9px] font-bold text-slate-400">0/30</span>
                    </div>
                    <input 
                      type="text" 
                      id="cheering-msg" 
                      placeholder="선수들을 응원하는 메세지를 남겨주세요." 
                      maxlength="30"
                      oninput="updateCharCount(this)"
                      class="w-full bg-white border border-slate-200 rounded-lg px-2.5 py-2 text-xs font-bold focus:outline-none focus:ring-1 focus:ring-rose-500 focus:bg-white focus:border-rose-500 transition-all placeholder:text-slate-400"
                      required
                    />
                  </div>
                </div>

                <!-- Submit Button -->
                <button 
                  type="submit" 
                  id="cheering-submit-btn"
                  class="w-full bg-slate-900 hover:bg-slate-800 text-white font-extrabold py-2 px-4 rounded-lg shadow-xs hover:shadow-sm transition-all text-xs tracking-wide flex justify-center items-center gap-1 cursor-pointer border-none"
                >
                  <span>🚀 실시간 응원전광판에 올리기</span>
                </button>
              </form>

              <div id="cheer-success-alert" class="hidden bg-emerald-500 text-white p-2 rounded-lg text-center text-xs font-semibold animate-pulse">
                ✨ 응원메시지가 등록되었습니다!
              </div>
            </div>

            <!-- Scrollable Feed list (Takes up all remaining vertical space) -->
            <div id="cheering-board-feed" class="flex-1 overflow-y-auto p-4 space-y-2 bg-slate-50/50 min-h-0">
              <div class="text-center py-16 text-slate-400 text-xs font-semibold">
                응원 메시지를 불러오고 있습니다... ⚽
              </div>
            </div>

          </div>

        </div>

      </div>
    </main>

    <!-- Invisible Canvas-based simple Confetti Container (when submitted) -->
    <div id="confetti-holder" class="pointer-events-none fixed inset-0 z-40 overflow-hidden"></div>

    <!-- Apps logic and interactions -->
    <script type="module" src="./script.js"></script>
  </body>
</html>
